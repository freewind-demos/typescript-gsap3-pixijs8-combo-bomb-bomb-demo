<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bomb + Bomb Combo Demo</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #1a1a2e;
      }
      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      canvas { border-radius: 8px; }
      .info {
        color: #eee;
        font-family: sans-serif;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>
      <p class="info">Click on bombs to swap them. Match 2 bombs for combo explosion!</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
